name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,pdf_footnotes]'
      - name: Pytest
        run: pytest tests/ -q

  lint-format:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: |
          python -m ruff check \
            offprint/doctor.py \
            offprint/gazetteer.py \
            offprint/holdings.py \
            scripts/quality/check_markdown_links.py \
            scripts/quality/doctor.py \
            scripts/reporting/gazetteer_report.py \
            scripts/reporting/holdings_report.py \
            tests/test_gazetteer.py \
            tests/test_holdings.py \
            tests/test_repository_docs.py
      - name: Black
        run: |
          python -m black --check \
            offprint/doctor.py \
            offprint/gazetteer.py \
            offprint/holdings.py \
            scripts/quality/check_markdown_links.py \
            scripts/quality/doctor.py \
            scripts/reporting/gazetteer_report.py \
            scripts/reporting/holdings_report.py \
            tests/test_gazetteer.py \
            tests/test_holdings.py \
            tests/test_repository_docs.py
      - name: Repo layout check
        run: |
          python scripts/quality/check_repo_layout.py --repo-root .
      - name: Documentation links
        run: |
          python scripts/quality/check_markdown_links.py --repo-root .
      - name: Gazetteer freshness
        run: |
          python scripts/reporting/gazetteer_report.py --repo-root . --check
